name: Backtest Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p backtest_results
          chmod -R 777 backtest_results

      - name: Fix permissions (data)
        run: |
          docker run --rm \
            --user 0 \
            --entrypoint /bin/sh \
            -v ${{ github.workspace }}:/freqtrade/user_data \
            freqtradeorg/freqtrade:stable \
            -c "chown -R 1000:1000 /freqtrade/user_data"

      - name: Run Freqtrade Backtest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/freqtrade/user_data \
            freqtradeorg/freqtrade:stable \
            backtesting \
            --config /freqtrade/user_data/config.json \
            --strategy LiquiditySweep \
            --strategy-path /freqtrade/user_data/strategies \
            --datadir /freqtrade/user_data/data \
            --data-format-ohlcv feather \
            --timerange 20260101- \
            --enable-protections

      - name: Upload Backtest Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_results/
