name: Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'

jobs:
  backtest:
    runs-on: ubuntu-latest
    container:
      image: freqtradeorg/freqtrade:stable
      options: --user root

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Prepare directory structure
      run: |
        mkdir -p user_data
        cp -r strategies user_data/
        if [ -d hyperopts ]; then cp -r hyperopts user_data/; fi

    - name: Download data
      run: |
        freqtrade download-data --exchange okx --pairs BTC/USDT ETH/USDT SOL/USDT --timeframes 15m 1h --days 30 -c config.json --datadir user_data/data/okx

    - name: Run Backtest
      run: |
        freqtrade backtesting --strategy LiquiditySweep -c config.json --user-data-dir user_data --timerange 20260101-

    - name: Upload backtest results
      uses: actions/upload-artifact@v4
      with:
        name: backtest-results
        path: user_data/backtest_results
