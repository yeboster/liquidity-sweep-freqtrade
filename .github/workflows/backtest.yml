name: Freqtrade Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Data
      run: |
        docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable download-data --exchange okx --days 365 -t 1h 15m --pairs BTC/USDT ETH/USDT SOL/USDT
        sudo chown -R $USER:$USER .

    - name: Run Backtest
      run: |
        docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable backtesting --config user_data/config.json --timerange 20250101-20260101 --export trades > backtest_results.txt
        sudo chown -R $USER:$USER .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backtest-results
        path: backtest_results.txt
