name: Backtest Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p backtest_results
          mkdir -p user_data/data
          mkdir -p user_data/strategies
          chmod -R 777 backtest_results user_data

      - name: Download Data
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/user_data:/freqtrade/user_data \
            -v ${{ github.workspace }}/config.json:/freqtrade/config.json \
            freqtradeorg/freqtrade:stable \
            download-data \
            --config /freqtrade/config.json \
            --days 30 \
            --timeframes 15m 1h \
            --data-format-ohlcv feather

      - name: Run Freqtrade Backtest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/user_data:/freqtrade/user_data \
            -v ${{ github.workspace }}/config.json:/freqtrade/config.json \
            -v ${{ github.workspace }}/strategies:/freqtrade/user_data/strategies \
            freqtradeorg/freqtrade:stable \
            backtesting \
            --config /freqtrade/config.json \
            --strategy LiquiditySweep \
            --timerange 20260101- \
            --data-format-ohlcv feather \
            --enable-protections

      - name: Upload Backtest Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_results/
