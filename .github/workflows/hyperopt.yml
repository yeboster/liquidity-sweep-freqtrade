name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare permissions
        run: |
          sudo chmod -R 777 .

      - name: Pull Freqtrade Image
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Download Data (730 days)
        run: |
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            download-data --config /freqtrade/user_data/config.json --days 730 -t 15m 1h

      - name: Run Hyperopt (500 epochs, ProfitDrawDownHyperOptLoss)
        run: |
          # Run hyperopt with ProfitDrawDownHyperOptLoss (better for sparse strategies)
          # Using 500 epochs, all spaces, min-trades 1 (allow any signal)
          # Note: Docker writes to strategies/ with ftuser permissions
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            hyperopt --config /freqtrade/user_data/config.json --hyperopt-loss ProfitDrawDownHyperOptLoss \
            --strategy LiquiditySweep --epochs 500 --spaces buy roi trailing stoploss \
            --job-workers 4 --print-json --no-color --min-trades 1 2>&1 | tee hyperopt_output.log
          
          # Fix permissions after docker run
          sudo chmod -R 777 .
          
          # Extract JSON result (last valid JSON params) from the log
          grep -E '^\{"params":' hyperopt_output.log | tail -1 > strategies/LiquiditySweep.json || echo '{}' > strategies/LiquiditySweep.json
          
          # Also extract best result summary if present
          grep -A5 "Best result:" hyperopt_output.log >> hyperopt_summary.txt 2>/dev/null || true
          cat strategies/LiquiditySweep.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-params
          path: |
            strategies/LiquiditySweep.json
            hyperopt_output.log
            hyperopt_summary.txt
