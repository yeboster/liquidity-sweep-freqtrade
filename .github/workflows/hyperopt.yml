name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Data
      # We mount the current directory to /freqtrade/user_data
      # Freqtrade docker image working directory is /freqtrade
      # So we need to ensure the data lands in user_data/data/okx
      run: |
        docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable download-data --exchange okx --days 365 -t 1h 15m --pairs BTC/USDT ETH/USDT SOL/USDT
        sudo chown -R $USER:$USER .

    - name: Run Hyperopt
      # Mount current directory to /freqtrade/user_data
      # Config is at user_data/config.json
      # Strategy is at user_data/strategies/LiquiditySweep.py
      # Output to user_data/strategies/LiquiditySweep.json
      run: |
        docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt --config user_data/config.json --hyperopt-loss SharpeHyperOptLoss --spaces buy roi trailing stoploss -e 100 --timerange 20250101-20260101 --print-json > strategies/LiquiditySweep.json
        sudo chown -R $USER:$USER .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hyperopt-results
        path: strategies/LiquiditySweep.json
