name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install freqtrade

      - name: Run Hyperopt
        run: |
          freqtrade hyperopt \
            --strategy LiquiditySweep \
            --config config.json \
            --spaces buy roi trailing stoploss \
            --hyperopt-loss SharpeHyperOptLoss \
            -e 100 \
            --user-data-dir .

      - name: Upload Hyperopt Results
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: strategies/LiquiditySweep.json
