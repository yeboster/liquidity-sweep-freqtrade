name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p hyperopt_results
          chmod -R 777 hyperopt_results
          # Ensure data exists or fails fast? We assume it's checked out.
          ls -R data

      - name: Pull Freqtrade Image
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Fix permissions (data)
        run: |
          docker run --rm \
            --user 0 \
            -v ${{ github.workspace }}:/freqtrade/user_data \
            freqtradeorg/freqtrade:stable \
            chown -R 1000:1000 /freqtrade/user_data

      - name: Run Hyperopt
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/freqtrade/user_data \
            freqtradeorg/freqtrade:stable \
            hyperopt \
            --config /freqtrade/user_data/config.json \
            --strategy LiquiditySweep \
            --strategy-path /freqtrade/user_data/strategies \
            --datadir /freqtrade/user_data/data \
            --data-format-ohlcv feather \
            --spaces buy roi trailing stoploss \
            --hyperopt-loss SharpeHyperOptLoss \
            -e 100 \
            --print-json

      - name: Extract Best Params
        run: |
          # Find the latest hyperopt result file (on host)
          LAST_RESULT=$(ls -t hyperopt_results/* | head -n1)
          
          if [ -z "$LAST_RESULT" ]; then
            echo "No hyperopt result found!"
            exit 1
          fi

          echo "Latest result: $LAST_RESULT"
          
          # Container path logic: host `hyperopt_results/foo` -> container `/freqtrade/user_data/hyperopt_results/foo`
          CONTAINER_PATH="/freqtrade/user_data/hyperopt_results/$(basename $LAST_RESULT)"
          
          # Write to strategies/LiquiditySweep.json on host
          docker run --rm \
            -v ${{ github.workspace }}:/freqtrade/user_data \
            freqtradeorg/freqtrade:stable \
            hyperopt-show \
            --config /freqtrade/user_data/config.json \
            --strategy LiquiditySweep \
            --strategy-path /freqtrade/user_data/strategies \
            --datadir /freqtrade/user_data/data \
            --data-format-ohlcv feather \
            --hyperopt-filename $CONTAINER_PATH \
            --print-json > strategies/LiquiditySweep.json
            
          echo "Optimized params saved to strategies/LiquiditySweep.json"
          cat strategies/LiquiditySweep.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: strategies/LiquiditySweep.json
