name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Freqtrade
        run: |
          pip install freqtrade
          pip install -r requirements.txt || true

      - name: Run Hyperopt
        run: |
          # Ensure user_data directories exist if needed
          mkdir -p user_data/strategies

          # Run hyperopt
          # -e 100: 100 epochs
          # --spaces: search spaces
          # --hyperopt-loss: loss function
          # --user-data-dir .: use current directory for data/results
          freqtrade hyperopt --config config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss SharpeHyperOptLoss \
            --spaces buy roi trailing stoploss \
            -e 100 \
            --user-data-dir . \
            --data-format-ohlcv feather \
            --no-color \
            --jobs 4

      - name: Export Best Parameters
        run: |
          # Find the latest hyperopt result file
          LATEST_FILE=$(ls -t hyperopt_results/*.pickle | head -n1)
          echo "Processing result file: $LATEST_FILE"
          
          # Export to JSON
          freqtrade hyperopt-show \
            --config config.json \
            --hyperopt-file "$LATEST_FILE" \
            --strategy LiquiditySweep \
            --print-json \
            --user-data-dir . > user_data/strategies/LiquiditySweep.json
          
          # Clean up the JSON (it might have logs at the top if stdout is mixed)
          # freqtrade hyperopt-show usually outputs only JSON if --print-json is used, but let's be safe.
          # We can use a simple python script to parse it if needed, but let's assume it's clean for now or inspect it later.
          cat user_data/strategies/LiquiditySweep.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-params
          path: user_data/strategies/LiquiditySweep.json
