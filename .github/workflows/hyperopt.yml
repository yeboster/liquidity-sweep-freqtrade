name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache TA-Lib
        id: cache-talib
        uses: actions/cache@v3
        with:
          path: ta-lib
          key: ${{ runner.os }}-talib-0.4.0

      - name: Install TA-Lib
        if: steps.cache-talib.outputs.cache-hit != 'true'
        run: |
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar xvzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          # rm -rf ta-lib ta-lib-0.4.0-src.tar.gz # Keep for cache

      - name: Install TA-Lib (cached)
        if: steps.cache-talib.outputs.cache-hit == 'true'
        run: |
          cd ta-lib
          sudo make install

      - name: Install Freqtrade
        run: |
          python -m pip install --upgrade pip
          pip install "freqtrade[hyperopt]"
          # Install any additional dependencies if requirements.txt exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare User Directory
        run: |
          mkdir -p user_data/strategies

      - name: Debug Data (Download)
        run: |
          # Download fresh data to ensure compatibility and presence
          freqtrade download-data --config config.json --days 30 --timeframes 15m 1h --data-format-ohlcv feather

          ls -R user_data/data
          
          # Verify freqtrade can see the data
          freqtrade list-data --config config.json --data-format-ohlcv feather

      - name: Run Hyperopt
        run: |
          # Run hyperopt with downloaded data
          freqtrade hyperopt --config config.json --hyperopt-loss SharpeHyperOptLoss --strategy LiquiditySweep --spaces buy roi trailing stoploss -e 100 --no-color --userdir user_data --data-format-ohlcv feather

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strategy-params
          path: user_data/strategies/LiquiditySweep.json
