name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Freqtrade Hyperopt
        # Mount current directory to /freqtrade/user_data
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt \
            --config /freqtrade/user_data/config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss SharpeHyperOptLoss \
            --spaces buy roi trailing stoploss \
            -e 100 \
            --data-format-ohlcv feather

      - name: Export Best Params
        # Export the best result from the latest hyperopt run to JSON
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt-show \
            --config /freqtrade/user_data/config.json \
            --hyperopt-filename last \
            --print-json > strategies/LiquiditySweep.json

      - name: Upload Hyperopt Results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-results
          path: strategies/LiquiditySweep.json
