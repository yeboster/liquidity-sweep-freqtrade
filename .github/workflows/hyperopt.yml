name: Hyperopt

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of epochs'
        required: false
        default: '100'

jobs:
  hyperopt:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install TA-Lib
      run: |
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..
        rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

    - name: Install Freqtrade
      run: |
        pip install --upgrade pip
        pip install freqtrade

    - name: Prepare directory structure
      run: |
        mkdir -p user_data
        cp -r strategies user_data/
        if [ -d hyperopts ]; then cp -r hyperopts user_data/; fi

    - name: Download data
      run: |
        freqtrade download-data --exchange okx --pairs BTC/USDT ETH/USDT SOL/USDT --timeframes 15m 1h --days 30 -c config.json --datadir user_data/data/okx

    - name: Run Hyperopt
      run: |
        # Create hyperopt results dir explicitly
        mkdir -p user_data/hyperopt_results
        
        freqtrade hyperopt \
          --hyperopt-loss SharpeHyperOptLoss \
          --spaces buy roi trailing stoploss \
          -e ${{ github.event.inputs.epochs }} \
          --strategy LiquiditySweep \
          -c config.json \
          --user-data-dir user_data

    - name: Export Results
      run: |
         freqtrade hyperopt-show \
          --hyperopt-loss SharpeHyperOptLoss \
          --strategy LiquiditySweep \
          -c config.json \
          --user-data-dir user_data \
          --print-json > user_data/strategies/LiquiditySweep.json

    - name: Upload strategy params
      uses: actions/upload-artifact@v4
      with:
        name: strategy-params
        path: user_data/strategies/LiquiditySweep.json
