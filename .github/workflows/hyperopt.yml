name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install TA-Lib
        run: |
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar xvzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Install Freqtrade
        run: |
          python -m pip install --upgrade pip
          pip install freqtrade
          # Install any additional dependencies if requirements.txt exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download Data
        run: |
          # Download 30 days of data for the pairs in config.json
          # We need to extract pairs from config or just hardcode based on what I saw (BTC, ETH, SOL)
          freqtrade download-data --config config.json --days 30 -t 15m 1h

      - name: Run Hyperopt
        run: |
          freqtrade hyperopt --config config.json --hyperopt-loss SharpeHyperOptLoss --strategy LiquiditySweep --spaces buy roi trailing stoploss -e 100 --no-color

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strategy-params
          path: strategies/LiquiditySweep.json
