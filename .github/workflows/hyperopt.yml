name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Download Data
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable \
          download-data --config config.json --days 30 --exchange okx -t 15m 1h --pairs BTC/USDT ETH/USDT SOL/USDT

      - name: Run Hyperopt
        run: |
          # Run hyperopt and ensure we have enough epochs
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable \
          hyperopt --config config.json --hyperopt-loss SharpeHyperOptLoss \
          --spaces buy roi trailing stoploss -e 100 --timerange 20240101- \
          --strategy LiquiditySweep

      - name: Export Best Params
        run: |
          # Find the latest hyperopt result file (pickle)
          LATEST_HYPEROPT=$(ls -t hyperopt_results/*.pickle | head -n 1)
          echo "Latest hyperopt result: $LATEST_HYPEROPT"
          
          # Extract the filename only
          HYPEROPT_FILE=$(basename "$LATEST_HYPEROPT")
          
          # Run hyperopt-show to get the JSON params
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable \
          hyperopt-show --hyperopt-filename "$HYPEROPT_FILE" --print-json > strategies/LiquiditySweep.json

      - name: Upload Params Artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: strategies/LiquiditySweep.json
