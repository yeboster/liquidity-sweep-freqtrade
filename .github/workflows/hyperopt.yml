name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Prepare Directories
      run: |
        mkdir -p user_data/data/binanceus
        mkdir -p user_data/strategies
        mkdir -p user_data/hyperopt_results
        cp strategies/LiquiditySweep.py user_data/strategies/
        cp config.json user_data/config.json
        # Switch exchange to binanceus for US-based CI runners
        sed -i 's/"name": "okx"/"name": "binanceus"/g' user_data/config.json

    - name: Download Data
      run: |
        # Download 30 days of data for BTC/ETH/SOL on 15m and 1h timeframes
        docker run --rm \
          --user $(id -u):$(id -g) \
          -v $(pwd)/user_data:/freqtrade/user_data \
          freqtradeorg/freqtrade:stable \
          download-data \
          --config /freqtrade/user_data/config.json \
          --days 30 \
          --timeframes 15m 1h

    - name: Run Hyperopt
      run: |
        # Run hyperopt with 100 epochs
        docker run --rm \
          --user $(id -u):$(id -g) \
          -v $(pwd)/user_data:/freqtrade/user_data \
          freqtradeorg/freqtrade:stable \
          hyperopt \
          --config /freqtrade/user_data/config.json \
          --strategy LiquiditySweep \
          --hyperopt-loss SharpeHyperOptLoss \
          --spaces buy roi trailing stoploss \
          -e 100 \
          --print-json > user_data/strategies/LiquiditySweep.json

    - name: Show Results (Debug)
      run: cat user_data/strategies/LiquiditySweep.json

    - name: Upload Parameters
      uses: actions/upload-artifact@v4
      with:
        name: optimized-params
        path: user_data/strategies/LiquiditySweep.json

    - name: Upload Full Results
      uses: actions/upload-artifact@v4
      with:
        name: hyperopt-results
        path: user_data/hyperopt_results/
