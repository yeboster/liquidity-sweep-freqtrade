name: Hyperopt Optimization

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of hyperopt epochs'
        required: false
        default: '100'
      timerange:
        description: 'Timerange for optimization (e.g., 20240101-)'
        required: false
        default: '20240101-'
      loss_function:
        description: 'Loss function for optimization'
        required: false
        default: 'SharpeHyperOptLoss'
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour timeout for long hyperopt runs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install freqtrade
          pip install ta-lib-bin  # Pre-compiled TA-Lib for CI

      - name: Create user_data structure
        run: |
          mkdir -p user_data/strategies
          mkdir -p user_data/data
          mkdir -p user_data/hyperopt_results
          cp strategies/LiquiditySweep.py user_data/strategies/
          cp config.json user_data/

      - name: Download historical data
        run: |
          freqtrade download-data \
            --config user_data/config.json \
            --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
            --timeframes 15m 1h \
            --pairs BTC/USDT ETH/USDT SOL/USDT \
            --exchange okx \
            --datadir user_data/data

      - name: Run Hyperopt
        run: |
          freqtrade hyperopt \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss ${{ github.event.inputs.loss_function || 'SharpeHyperOptLoss' }} \
            --spaces buy roi trailing stoploss \
            --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
            --epochs ${{ github.event.inputs.epochs || '100' }} \
            --random-state 42 \
            --min-trades 10 \
            --datadir user_data/data \
            --export-csv user_data/hyperopt_results/hyperopt_results.csv \
            --print-json \
            | tee hyperopt_output.log

      - name: Extract best parameters
        run: |
          # Extract the JSON block from hyperopt output
          grep -A 1000 "Best result:" hyperopt_output.log | grep -A 1000 "{" | head -100 > best_params.json || true
          
          # Also try to get params from the hyperopt results
          freqtrade hyperopt-show --best --print-json \
            --config user_data/config.json \
            --datadir user_data/data \
            > best_params_full.json 2>/dev/null || echo "{}" > best_params_full.json
          
          # Export the params file for the strategy (if freqtrade generated one)
          if [ -f "user_data/strategies/LiquiditySweep.json" ]; then
            cp user_data/strategies/LiquiditySweep.json ./strategy_params.json
          fi
          
          # List what we have
          echo "=== Generated Files ==="
          ls -la *.json user_data/hyperopt_results/ 2>/dev/null || true

      - name: Run backtest with optimized params
        run: |
          freqtrade backtesting \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
            --datadir user_data/data \
            | tee backtest_results.txt

      - name: Upload hyperopt results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-results-${{ github.run_number }}
          path: |
            best_params.json
            best_params_full.json
            strategy_params.json
            hyperopt_output.log
            backtest_results.txt
            user_data/hyperopt_results/
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## Hyperopt Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Epochs:** ${{ github.event.inputs.epochs || '100' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Loss Function:** ${{ github.event.inputs.loss_function || 'SharpeHyperOptLoss' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timerange:** ${{ github.event.inputs.timerange || '20240101-' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Best Parameters" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat best_params_full.json >> $GITHUB_STEP_SUMMARY || echo "See artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backtest Results (Optimized)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 backtest_results.txt >> $GITHUB_STEP_SUMMARY || echo "See artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
