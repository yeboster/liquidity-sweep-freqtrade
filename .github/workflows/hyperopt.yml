name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare User Data Directory
        run: |
          mkdir -p user_data/strategies
          # Ensure permissions are correct for Docker mount
          chmod -R 777 .

      - name: Run Hyperopt (Docker)
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss SharpeHyperOptLoss \
            --spaces buy roi trailing stoploss \
            -e 100 \
            --data-format-ohlcv feather \
            --no-color

          # Fix permissions after Docker run
          sudo chown -R $USER:$USER .

      - name: Export Best Parameters
        run: |
          # Debug file location
          echo "Listing all pickle files:"
          find . -name "*.pickle" || echo "No pickles found with find"
          ls -R hyperopt_results || echo "hyperopt_results not found"

          # Find the latest hyperopt result file (looking for .fthypt or .pickle or .json)
          LATEST_FILE=$(find . -name "*_LiquiditySweep_*.fthypt" -o -name "*_LiquiditySweep_*.pickle" -o -name "*_LiquiditySweep_*.json" | sort | tail -1)
          
          if [ -z "$LATEST_FILE" ]; then
             # Fallback to any file in hyperopt_results that looks like a result
             LATEST_FILE=$(find hyperopt_results -type f -not -name "*tickerdata*" | sort | tail -1)
          fi
          
          if [ -z "$LATEST_FILE" ]; then
            echo "Error: No hyperopt result file found!"
            ls -R
            exit 1
          fi
          
          # Clean path (remove leading ./)
          LATEST_FILE=${LATEST_FILE#./}
          echo "Processing result file: $LATEST_FILE"
          
          # Export to JSON
          # Note: file path is relative to the container's workdir (/freqtrade)
          # So we prepend user_data/
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt-show \
            --config user_data/config.json \
            --hyperopt-file "user_data/$LATEST_FILE" \
            --strategy LiquiditySweep \
            --print-json > user_data/strategies/LiquiditySweep.json

          # Fix permissions again
          sudo chown -R $USER:$USER .

          # Verify content
          cat user_data/strategies/LiquiditySweep.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-params
          path: user_data/strategies/LiquiditySweep.json
