name: Hyperopt

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of epochs'
        required: false
        default: '100'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    container:
      image: freqtradeorg/freqtrade:stable
      options: --user root  # Run as root to avoid permission issues with GHA volume mounts

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Freqtrade expects a user_data directory structure. Let's create it or symlink.
    # Our repo has strategies/* and config.json at root.
    - name: Prepare directory structure
      run: |
        mkdir -p user_data
        cp -r strategies user_data/
        # Check if hyperopts exists
        if [ -d hyperopts ]; then cp -r hyperopts user_data/; fi
        
        # Ensure config points to correct directories if needed, or just rely on default structure
        # We will download data fresh

    - name: Download data
      run: |
        freqtrade download-data --exchange okx --pairs BTC/USDT ETH/USDT SOL/USDT --timeframes 15m 1h --days 30 -c config.json --datadir user_data/data/okx

    - name: Run Hyperopt
      run: |
        freqtrade hyperopt \
          --hyperopt-loss SharpeHyperOptLoss \
          --spaces buy roi trailing stoploss \
          -e ${{ github.event.inputs.epochs }} \
          --strategy LiquiditySweep \
          -c config.json \
          --user-data-dir user_data

    - name: Upload strategy params
      uses: actions/upload-artifact@v4
      with:
        name: strategy-params
        path: user_data/strategies/LiquiditySweep.json
