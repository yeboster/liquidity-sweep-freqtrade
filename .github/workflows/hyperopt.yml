name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare permissions
        run: |
          sudo chmod -R 777 .

      - name: Pull Freqtrade Image
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Download Data (365 days)
        run: |
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            download-data --config /freqtrade/user_data/config.json --days 365 -t 15m 1h

      - name: Run Hyperopt (200 epochs)
        run: |
          # Run hyperopt and capture output
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            hyperopt --config /freqtrade/user_data/config.json --hyperopt-loss SharpeHyperOptLoss \
            --strategy LiquiditySweep --epochs 200 --spaces buy roi trailing stoploss \
            --job-workers 4 --print-json --no-color 2>&1 | tee hyperopt_output.log
          
          # Extract JSON result (last JSON object in output)
          grep -E '^\{' hyperopt_output.log | tail -1 > strategies/LiquiditySweep.json || echo '{"error": "no_result"}' > strategies/LiquiditySweep.json
          cat strategies/LiquiditySweep.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-params
          path: |
            strategies/LiquiditySweep.json
            hyperopt_output.log
