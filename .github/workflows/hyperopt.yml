name: Hyperopt Optimization

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of hyperopt epochs'
        required: false
        default: '100'
      timerange:
        description: 'Timerange for optimization (e.g., 20240101-)'
        required: false
        default: '20240101-'
      loss_function:
        description: 'Loss function for optimization'
        required: false
        default: 'SharpeHyperOptLoss'

# NOTE: hyperopt is NOT triggered on push — it's expensive and run manually.
# Use workflow_dispatch from GitHub Actions UI to trigger.

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour timeout for long hyperopt runs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p user_data/data
          mkdir -p user_data/strategies
          mkdir -p user_data/hyperopt_results
          chmod -R 777 user_data

      - name: Copy strategy and config
        run: |
          cp strategies/LiquiditySweep.py user_data/strategies/
          cp config.json user_data/

      - name: Download historical data
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/user_data:/freqtrade/user_data \
            -v ${{ github.workspace }}/config.json:/freqtrade/config.json \
            freqtradeorg/freqtrade:stable \
            download-data \
            --config /freqtrade/config.json \
            --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
            --timeframes 15m 1h \
            --data-format-ohlcv feather

      - name: Run Hyperopt
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/user_data:/freqtrade/user_data \
            -v ${{ github.workspace }}/config.json:/freqtrade/config.json \
            -v ${{ github.workspace }}/strategies:/freqtrade/user_data/strategies \
            --entrypoint /bin/bash \
            freqtradeorg/freqtrade:stable \
            -c "pip install smartmoneyconcepts && freqtrade hyperopt \
              --config /freqtrade/config.json \
              --strategy LiquiditySweep \
              --hyperopt-loss ${{ github.event.inputs.loss_function || 'SharpeHyperOptLoss' }} \
              --spaces buy roi trailing stoploss \
              --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
              --epochs ${{ github.event.inputs.epochs || '100' }} \
              --random-state 42 \
              --min-trades 5 \
              --data-format-ohlcv feather \
              --print-json" \
            | tee hyperopt_output.log
          # Non-zero exit from docker will fail the job — no more silent failures.

      - name: Extract best parameters
        if: always()
        run: |
          # Show best result from log
          grep -A 50 "Best result:" hyperopt_output.log || echo "No best result found — hyperopt may have failed."

          # Export params file if freqtrade wrote one
          if [ -f "user_data/strategies/LiquiditySweep.json" ]; then
            cp user_data/strategies/LiquiditySweep.json ./strategy_params.json
            echo "✅ strategy_params.json extracted"
          else
            echo "⚠️  No strategy_params.json found (may need more epochs or trades)"
            echo "{}" > strategy_params.json
          fi

          # Show hyperopt results directory
          ls -la user_data/hyperopt_results/ || echo "No hyperopt_results dir"

      - name: Run backtest with optimized params
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/user_data:/freqtrade/user_data \
            -v ${{ github.workspace }}/config.json:/freqtrade/config.json \
            -v ${{ github.workspace }}/strategies:/freqtrade/user_data/strategies \
            --entrypoint /bin/bash \
            freqtradeorg/freqtrade:stable \
            -c "pip install smartmoneyconcepts && freqtrade backtesting \
              --config /freqtrade/config.json \
              --strategy LiquiditySweep \
              --timerange ${{ github.event.inputs.timerange || '20240101-' }} \
              --data-format-ohlcv feather \
              --export trades \
              --export-filename user_data/backtest_results/backtest-trades.json" \
            | tee backtest_results.txt

      - name: Upload hyperopt results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hyperopt-results-${{ github.run_number }}
          path: |
            strategy_params.json
            hyperopt_output.log
            backtest_results.txt
            user_data/hyperopt_results/
            user_data/backtest_results/
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## Hyperopt Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Epochs:** ${{ github.event.inputs.epochs || '100' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Loss Function:** ${{ github.event.inputs.loss_function || 'SharpeHyperOptLoss' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timerange:** ${{ github.event.inputs.timerange || '20240101-' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Best Parameters" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat strategy_params.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "See artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backtest Results (Optimized)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 backtest_results.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "See artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
