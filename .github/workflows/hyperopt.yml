name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install TA-Lib
        run: |
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "freqtrade[hyperopt]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Hyperopt
        run: |
          mkdir -p user_data/strategies
          freqtrade hyperopt --config config.json --strategy LiquiditySweep --hyperopt-loss SharpeHyperOptLoss --spaces buy roi trailing stoploss -e 100 --datadir data --timerange 20240101-

      - name: Extract Best Params
        run: |
          freqtrade hyperopt-show --config config.json --hyperopt-loss SharpeHyperOptLoss --print-json --datadir data > user_data/strategies/LiquiditySweep.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-params
          path: user_data/strategies/LiquiditySweep.json
