name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare permissions
        run: |
          sudo chmod -R 777 .

      - name: Pull Freqtrade Image
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Download Data
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable \
            download-data --config config.json --days 30 -t 15m 1h

      - name: Run Hyperopt
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable \
            hyperopt --config config.json --hyperopt-loss SharpeHyperOptLoss \
            --strategy LiquiditySweep --epochs 100 --spaces buy roi trailing stoploss \
            --job-workers 4
          
          # Find the latest result file
          LATEST_RESULT=$(ls -t hyperopt_results/*.json | head -n 1)
          echo "Latest result: $LATEST_RESULT"
          
          # Copy it to strategies/LiquiditySweep.json so we can easily pick it up
          cp "$LATEST_RESULT" strategies/LiquiditySweep.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-results
          path: strategies/LiquiditySweep.json
