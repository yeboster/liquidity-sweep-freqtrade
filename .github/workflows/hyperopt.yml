name: Freqtrade Hyperopt

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/LiquiditySweep.py'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare permissions
        run: |
          sudo chmod -R 777 .

      - name: Pull Freqtrade Image
        run: docker pull freqtradeorg/freqtrade:stable

      - name: Download Data
        run: |
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            download-data --config /freqtrade/user_data/config.json --days 30 -t 15m 1h --exchange okx

      - name: Run Hyperopt
        run: |
          # Use --print-json and redirect specifically to a file on the host mount
          docker run --rm -v ${{ github.workspace }}:/freqtrade/user_data freqtradeorg/freqtrade:stable \
            hyperopt --config /freqtrade/user_data/config.json --hyperopt-loss SharpeHyperOptLoss \
            --strategy LiquiditySweep --epochs 100 --spaces buy roi trailing stoploss \
            --job-workers 4 --print-json --logfile /dev/null > hyperopt_raw.txt
          
          # Clean up and extract JSON
          grep -v "^202" hyperopt_raw.txt | grep "{" > strategies/LiquiditySweep.json || true
          cat strategies/LiquiditySweep.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: hyperopt-params
          path: |
            strategies/LiquiditySweep.json
            hyperopt_raw.txt
