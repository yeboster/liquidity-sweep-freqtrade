name: Hyperopt Strategy

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of epochs'
        required: true
        default: '100'
  push:
    paths:
      - 'strategies/**'
      - 'config.json'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install freqtrade

      - name: Download Data
        run: |
          # Download 30 days of data for optimization
          freqtrade download-data --config config.json --days 30 -t 15m 1h --exchange okx

      - name: Run Hyperopt
        run: |
          # Ensure strategy dir exists in python path or config
          freqtrade hyperopt --config config.json --strategy LiquiditySweep --hyperopt-loss SharpeHyperOptLoss --spaces buy roi trailing stoploss -e ${{ inputs.epochs || 100 }} --job-workers 4

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: strategies/LiquiditySweep.json
