name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create user_data directory structure in artifact prep
        run: mkdir -p user_data/strategies

      - name: Run Freqtrade Hyperopt
        # We mount the current directory (repository root) to /freqtrade/user_data
        # Run as the runner user to avoid permission issues
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss SharpeHyperOptLoss \
            --spaces buy roi trailing stoploss \
            -e 100 \
            --job-workers 4

      - name: Extract Best Parameters
        # Run hyperopt-show to output the best parameters as JSON
        # Output to root first to match permissions
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt-show \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --print-json > LiquiditySweep_optimized.json

      - name: Upload Best Parameters
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: LiquiditySweep_optimized.json
