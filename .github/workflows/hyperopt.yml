name: Hyperopt Strategy

on:
  workflow_dispatch:
  push:
    paths:
      - 'strategies/**'
      - '.github/workflows/hyperopt.yml'

jobs:
  hyperopt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create user_data directory structure in artifact prep
        run: mkdir -p user_data/strategies

      - name: Run Freqtrade Hyperopt
        # Run as default user (usually ftuser or root inside container)
        # We will fix permissions afterwards
        run: |
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --hyperopt-loss SharpeHyperOptLoss \
            --spaces buy roi trailing stoploss \
            -e 100 \
            --job-workers 4

      - name: Extract Best Parameters
        run: |
          # Generate the JSON file as container user
          # Note: We output to a temp file then move it to handle permissions/paths
          docker run --rm -v $(pwd):/freqtrade/user_data freqtradeorg/freqtrade:stable hyperopt-show \
            --config user_data/config.json \
            --strategy LiquiditySweep \
            --print-json > LiquiditySweep_temp.json
          
          # Fix permissions for the entire user_data directory and temp file so the runner can access it
          sudo chown -R $USER:$USER .
          
          # Move/Rename to the desired artifact path
          mv LiquiditySweep_temp.json user_data/strategies/LiquiditySweep.json

      - name: Upload Best Parameters
        uses: actions/upload-artifact@v4
        with:
          name: optimized-params
          path: user_data/strategies/LiquiditySweep.json
